name: Build & Deploy (LeComptoirImmo)

# Pipeline reproductible : build des images → push sur ghcr.io → le VPS PULL.
# Plus de build sur le VPS ni de tar-extract : ce qui tourne == l'image du commit.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   VPS_HOST, VPS_PORT, VPS_USER, VPS_SSH_KEY (clé privée de déploiement)
# GHCR : pas de secret à créer, GITHUB_TOKEN suffit (packages: write ci-dessous).

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-immo
  # true : un déploiement plus récent annule un run précédent bloqué (pas de file
  # d'attente figée). La logique de deploy est idempotente (force-recreate + vérif).
  cancel-in-progress: true

env:
  BACKEND_IMAGE: ghcr.io/service-lecomptoir/immo-backend
  FRONTEND_IMAGE: ghcr.io/service-lecomptoir/immo-frontend

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Connexion à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/Dockerfile.backend
          target: production
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/Dockerfile.frontend
          target: production
          push: true
          build-args: |
            VITE_API_URL=https://immo.lecomptoir.services
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 15        # un déploiement ne doit jamais rester bloqué
    # Tant que les secrets VPS ne sont pas configurés, on n'active pas le déploiement
    # SSH (évite un run rouge). À activer : repo → Settings → Variables → Actions →
    # New variable : DEPLOY_ENABLED = true (après avoir ajouté les secrets VPS_*).
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    permissions:
      contents: read
      packages: read        # autorise le VPS à pull les images via le GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      # Envoie le compose de déploiement (images) sur le VPS.
      - name: Copier le compose de déploiement
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker/docker-compose.deploy.yml
          target: ~/LeComptoirImmo

      - name: Pull & up sur le VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/LeComptoirImmo
            export IMAGE_TAG=${{ github.sha }}
            COMPOSE="docker compose -p docker -f docker/docker-compose.deploy.yml"
            # Pull avec retry : un hoquet ghcr transitoire ne doit pas sauter le up.
            n=0; max=8; until { echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin >/dev/null 2>&1 && $COMPOSE pull backend frontend; }; do n=$((n+1)); [ "$n" -ge "$max" ] && { echo "pull KO apres $max essais (~4 min)"; exit 1; }; echo "ghcr 403 probable (propagation du tag), retry $n/$max"; sleep 30; done
            # Recreation forcee des services applicatifs (corrige le cas ou compose ne
            # detecte pas le changement) ; --no-deps : on ne redemarre jamais la base.
            $COMPOSE up -d --force-recreate --no-deps backend frontend
            # Garde-fou : l'image qui tourne DOIT porter le SHA, sinon echec visible.
            running=$(docker inspect locataire_backend --format '{{.Config.Image}}')
            case "$running" in *"${IMAGE_TAG}"*) echo "OK deploiement : $running" ;; *) echo "ECHEC : conteneur sur $running au lieu de ${IMAGE_TAG}"; exit 1 ;; esac
            docker image prune -f
            docker logout ghcr.io
