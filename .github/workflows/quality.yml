name: Qualité (lint + types)

# Garde-fou qualité : lint (ruff), format (ruff format) et typage (mypy, socle
# progressif). Rapide, sans base de données : tourne à chaque push / PR.

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Installer les outils
        run: pip install ruff==0.15.16 mypy pydantic pydantic-settings
      - name: Ruff (lint)
        run: ruff check app
      - name: Ruff (format)
        run: ruff format --check app
      - name: Mypy (socle typé)
        run: mypy
