[tool.ruff]
# Qualité de code : linter + formateur (https://docs.astral.sh/ruff/).
# Lancer :  ruff check app   /   ruff format app
target-version = "py312"
line-length = 100
extend-exclude = ["alembic", "migrations", ".venv"]

[tool.ruff.lint]
# Gate axé "vrais défauts" : F (pyflakes : noms indéfinis, imports/variables
# inutilisés, redéfinitions), E9 (erreurs de syntaxe), I (tri des imports),
# UP/C4 (modernisations sûres). Le style pur (E1/E2/E7) et l'opinion (B/SIM)
# sont hors gate ; E711/E712 sont de faux positifs sur les filtres SQLAlchemy.
select = ["E9", "F", "I", "UP", "C4"]
ignore = [
    "UP042",  # migration vers enum.StrEnum : changement sémantique, plus tard
    "C416",   # comprehensions triviales : pas de gain
    "C401",
    "UP045",  # Optional[X] vs X|None : cosmétique
    "F841",   # variables locales inutilisées : à nettoyer au fil de l'eau
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811", "F841"]
"**/__init__.py" = ["F401"]                 # ré-exports volontaires
"app/api/v1/public.py" = ["F811"]           # imports paresseux locaux assumés
"app/api/v1/payments.py" = ["F811"]         # alias de compat get_current_user

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.mypy]
# Adoption progressive : mypy démarre sur un socle de modules typés (sécurité,
# RGPD) et s'élargira au fil du temps. `follow_imports=silent` évite de bloquer
# sur le code legacy non encore typé.
python_version = "3.12"
ignore_missing_imports = true
follow_imports = "silent"
plugins = ["pydantic.mypy"]
files = [
    "app/core/security_headers.py",
    "app/core/rate_limit.py",
]
