version: "3.9"

# ── Production VPS ────────────────────────────────────────────────────────────
# Usage : docker compose -f docker/docker-compose.prod.yml up -d

services:

  postgres:
    image: postgres:16-alpine
    container_name: locataire_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"                        # Non exposé publiquement en prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locataire_net

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
      target: production
    container_name: locataire_backend
    restart: always
    env_file:
      - ../backend/.env
    environment:
      APP_ENV: production
      POSTGRES_HOST: postgres
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - locataire_net

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: production
    container_name: locataire_frontend
    restart: always
    expose:
      - "80"
    networks:
      - locataire_net

  # ── Nginx reverse proxy + SSL ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: locataire_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - locataire_net

  # ── Certbot (Let's Encrypt SSL) ───────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: locataire_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renouvellement automatique : à exécuter manuellement ou via cron
    # docker compose run certbot renew

volumes:
  postgres_data:
  uploads_data:
  certbot_www:
  certbot_certs:

networks:
  locataire_net:
    driver: bridge
