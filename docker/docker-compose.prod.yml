# ── Production VPS ────────────────────────────────────────────────────────────
# Usage : docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Stack : PostgreSQL (base partagée) + LeComptoirImmo (backend 8000 / frontend)
#         + Alice (backend 8001 / frontend) + Nginx reverse proxy + Certbot
#
# Les secrets viennent des fichiers .env.prod (hors git) — la prod lit .env.prod
# DIRECTEMENT (pas .env, qui reste la config de dev avec @localhost) :
#   - backend/.env.prod        → POSTGRES_*, SECRET_KEY, DATABASE_URL (@postgres), ALICE_*, SMTP_*
#   - alice/backend/.env.prod  → SECRET_KEY, DATABASE_URL (@postgres, même base), INTERNAL_API_KEY

services:

  postgres:
    image: postgres:16-alpine
    container_name: locataire_postgres
    restart: always
    env_file:
      - ../backend/.env                # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"                          # Non exposé publiquement
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locataire_net

  # ── LeComptoirImmo backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
      target: production
    container_name: locataire_backend
    restart: always
    env_file:
      - ../backend/.env.prod
    environment:
      APP_ENV: production
      POSTGRES_HOST: postgres
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - locataire_net

  # ── LeComptoirImmo frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: production
      args:
        VITE_API_URL: "https://immo.lecomptoir.services"
    container_name: locataire_frontend
    restart: always
    expose:
      - "80"
    networks:
      - locataire_net

  # ── Alice backend (même base de données) ─────────────────────────────────
  alice-backend:
    build:
      context: ../alice/backend
      dockerfile: ../../docker/Dockerfile.alice-backend
      target: production
    container_name: alice_backend
    restart: always
    env_file:
      - ../alice/backend/.env.prod
    environment:
      APP_ENV: production
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8001"
    networks:
      - locataire_net

  # ── Alice frontend ─────────────────────────────────────────────────────────
  alice-frontend:
    build:
      context: ../alice/frontend
      dockerfile: ../../docker/Dockerfile.alice-frontend
      target: production
      args:
        VITE_API_URL: "https://alice.lecomptoir.services"
    container_name: alice_frontend
    restart: always
    expose:
      - "80"
    networks:
      - locataire_net

  # ── Nginx reverse proxy + SSL ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: locataire_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
      - alice-backend
      - alice-frontend
    networks:
      - locataire_net

  # ── Certbot (Let's Encrypt SSL) ───────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: locataire_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Émission/renouvellement à exécuter manuellement (voir deploy.sh --ssl)

volumes:
  postgres_data:
  uploads_data:
  certbot_www:
  certbot_certs:

networks:
  locataire_net:
    driver: bridge
