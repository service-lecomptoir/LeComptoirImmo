# ── Production VPS ────────────────────────────────────────────────────────────
# Usage : docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Stack : PostgreSQL + LeComptoirImmo (backend 8000 / frontend, exposés en interne).
# NB 1 : le reverse-proxy TLS mutualisé (nginx + certbot) a été EXTRAIT vers le
#        projet d'infra autonome « LeComptoirInfra » (~/LeComptoirInfra, projet
#        compose « edge »). Il route immo/alice/sejour/portail360 et détient le cert.
# NB 2 : Alice est un produit autonome (dépôt LeComptoirAlice) ; LeCI l'interroge
#        uniquement via son API interne (X-Internal-Key).
#
# Les secrets viennent des fichiers .env.prod (hors git) — la prod lit .env.prod
# DIRECTEMENT (pas .env, qui reste la config de dev avec @localhost) :
#   - backend/.env.prod  → POSTGRES_*, SECRET_KEY, DATABASE_URL (@postgres), ALICE_*, SMTP_*

services:

  postgres:
    image: postgres:16-alpine
    container_name: locataire_postgres
    restart: always
    env_file:
      - ../backend/.env                # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"                          # Non exposé publiquement
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locataire_net

  # ── LeComptoirImmo backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
      target: production
    container_name: locataire_backend
    restart: always
    env_file:
      - ../backend/.env.prod
    environment:
      APP_ENV: production
      POSTGRES_HOST: postgres
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - locataire_net

  # ── LeComptoirImmo frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      target: production
      args:
        VITE_API_URL: "https://immo.lecomptoir.services"
    container_name: locataire_frontend
    restart: always
    expose:
      - "80"
    networks:
      - locataire_net

  # ── Reverse-proxy TLS (nginx + certbot) ───────────────────────────────────────
  # RETIRÉ d'ici : extrait vers le projet d'infra autonome « LeComptoirInfra »
  # (~/LeComptoirInfra, projet compose « edge »). Les conteneurs backend/frontend
  # ci-dessus restent exposés en interne (réseau docker_locataire_net) et sont
  # routés par l'edge mutualisé. Voir LeComptoirInfra/README.md.

volumes:
  postgres_data:
  uploads_data:

networks:
  locataire_net:
    driver: bridge
