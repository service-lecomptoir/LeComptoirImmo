# ══════════════════════════════════════════════════════════════════════════════
# Nginx — Reverse proxy PRODUCTION (HTTPS)
#
# Mapping :
#   immo.lecomptoir.services      → LeComptoirImmo (frontend + backend:8000)
#   proxygen.lecomptoir.services  → ProxyGen       (proxygen-frontend + proxygen-backend:8001)
#   lecomptoir.services + www     → redirection 301 vers immo.lecomptoir.services
#
# Certificat multi-domaine : /etc/letsencrypt/live/immo.lecomptoir.services/
#
# IMPORTANT — résolution DNS dynamique :
#   Les upstreams sont passés via des VARIABLES + resolver Docker (127.0.0.11).
#   Sans cela, nginx fige l'IP des conteneurs au démarrage et route vers une
#   mauvaise app après un rebuild de backend/frontend (IP réattribuées).
# ══════════════════════════════════════════════════════════════════════════════

# ── HTTP : challenge ACME + redirection vers HTTPS ────────────────────────────
server {
    listen 80 default_server;
    server_name immo.lecomptoir.services proxygen.lecomptoir.services lecomptoir.services www.lecomptoir.services _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Racine + www → redirection vers immo ──────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name lecomptoir.services www.lecomptoir.services;

    ssl_certificate     /etc/letsencrypt/live/immo.lecomptoir.services/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/immo.lecomptoir.services/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    return 301 https://immo.lecomptoir.services$request_uri;
}

# ── LeComptoirImmo — HTTPS ────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name immo.lecomptoir.services;

    ssl_certificate     /etc/letsencrypt/live/immo.lecomptoir.services/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/immo.lecomptoir.services/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    # Résolution dynamique des upstreams (DNS Docker)
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $up_backend  backend;
    set $up_frontend frontend;

    location /api/v1/auth/login {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://$up_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://$up_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    location /uploads/ {
        proxy_pass http://$up_backend:8000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://$up_backend:8000;
        access_log off;
    }

    location / {
        proxy_pass http://$up_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}

# ── ProxyGen — HTTPS ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name proxygen.lecomptoir.services;

    ssl_certificate     /etc/letsencrypt/live/immo.lecomptoir.services/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/immo.lecomptoir.services/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $up_pbackend  proxygen-backend;
    set $up_pfrontend proxygen-frontend;

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://$up_pbackend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://$up_pbackend:8001;
        access_log off;
    }

    location / {
        proxy_pass http://$up_pfrontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
