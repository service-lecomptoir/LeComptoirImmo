# ══════════════════════════════════════════════════════════════════════════════
# Nginx — Reverse proxy (phase HTTP)
#
# Deux vhosts :
#   - lecomptoir.services (+ www, + IP par défaut) → LeComptoirImmo
#   - proxygen.lecomptoir.services                 → ProxyGen
#
# SSL : ce fichier est volontairement en HTTP seul pour permettre le démarrage
#       de nginx AVANT l'émission des certificats (challenge ACME ci-dessous).
#       Une fois les certificats Let's Encrypt obtenus, on bascule sur la version
#       HTTPS (nginx-site-ssl.conf).
# ══════════════════════════════════════════════════════════════════════════════

# ── LeComptoirImmo — immo.lecomptoir.services ─────────────────────────────────
# (default_server : sert aussi la racine/www/IP en phase HTTP)
server {
    listen 80 default_server;
    server_name immo.lecomptoir.services lecomptoir.services www.lecomptoir.services _;

    client_max_body_size 20M;

    # Challenge ACME (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth : rate limiting strict
    location /api/v1/auth/login {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API backend
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # Fichiers uploadés (logos, documents)
    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
    }

    # Frontend React (SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}

# ── ProxyGen — proxygen.lecomptoir.services ───────────────────────────────────
server {
    listen 80;
    server_name proxygen.lecomptoir.services;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API ProxyGen
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://proxygen-backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://proxygen-backend:8001/health;
        access_log off;
    }

    # Frontend ProxyGen (SPA)
    location / {
        proxy_pass http://proxygen-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
